name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          openjdk-17-jdk \
          unzip \
          zlib1g-dev \
          libncurses6 \
          libstdc++6 \
          libffi-dev \
          libssl-dev \
          autoconf \
          automake \
          libtool \
          cmake

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install cython==0.29.33
        python -m pip install buildozer

    - name: Copy app files to source directory
      run: |
        cp zahel_mobile/main.py .
        cp -r zahel_mobile/config .
        cp -r zahel_mobile/api .
        cp -r zahel_mobile/i18n .
        cp -r zahel_mobile/assets .
        cp zahel_mobile/*.py .
        cp zahel_mobile/*.html .
        cp zahel_mobile/*.json .
        rm -f map_selection_screen_backup.py
        rm -f main_backup.py
        rm -f api_client.py
        ls -la

    - name: Clean Gradle cache
      run: |
        rm -rf ~/.gradle/caches/
        rm -rf .buildozer/android/platform/build-arm64-v8a/dists/
        echo "Cache Gradle nettoyé"

    - name: Configure Buildozer
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init
        fi

    - name: Build Android APK (Debug)
      run: |
        buildozer android debug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: zahel-debug-apk
        path: bin/*.apk

    - name: Build Android APK (Release)
      if: github.event_name == 'workflow_dispatch'
      run: |
        echo "Release build requires keystore setup"

    - name: Upload Release APK
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: zahel-release-apk
        path: bin/*.apk
